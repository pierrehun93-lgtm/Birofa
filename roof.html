<style>
/* Lightbox */
.lightbox {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.95);
    z-index: 9999;

    /* important: start hidden safely */
    display: none;
}

/* Swiper full screen */
.swiper {
    width: 100%;
    height: 100%;
}

.swiper-wrapper {
    width: 100%;
    height: 100%;
}

.swiper-slide {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
}

.swiper-slide img {
    max-width: 90vw;
    max-height: 90vh;
    width: auto;
    height: auto;
    object-fit: contain;
}

/* navigation above everything */
.swiper-button-next,
.swiper-button-prev {
    z-index: 10000;
}

/* close button */
.close {
    position: fixed;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 35px;
    cursor: pointer;
    z-index: 10001;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
let swiper = null;
const lightbox = document.getElementById("lightbox");

function initSwiper() {
    swiper = new Swiper('.mySwiper', {
        navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
        },
        keyboard: {
            enabled: true,
        },
        observer: true,
        observeParents: true
    });
}

function openSwiper(index) {

    lightbox.style.display = "block";
    document.body.style.overflow = "hidden";

    if (!swiper) {
        initSwiper();
    }

    requestAnimationFrame(() => {
        swiper.update();
        swiper.slideTo(index, 0);
    });
}

function closeSwiper() {
    lightbox.style.display = "none";
    document.body.style.overflow = "";
}
</script>
